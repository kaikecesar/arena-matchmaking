# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: pt-BR

reviews:
  # Triggers auto review when a PR is opened (non-draft) or marked "Ready for review".
  # Draft PRs are silently skipped — finish the work, click "Ready for review", and CodeRabbit acts.
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  # Generate a high-level summary at the top of each PR review.
  high_level_summary: true

  # Post a single consolidated comment instead of many inline noise comments.
  review_status: true
